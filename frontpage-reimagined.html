<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linky Subtle Dashboard Concept</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-strong: #ffffff;
      --text: #171a21;
      --muted: #69707d;
      --line: rgba(24, 28, 37, 0.1);
      --line-strong: rgba(24, 28, 37, 0.16);
      --accent: #3267e3;
      --accent-soft: rgba(50, 103, 227, 0.1);
      --shadow: 0 10px 28px rgba(34, 40, 55, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      background:
        linear-gradient(90deg, rgba(24, 28, 37, 0.026) 1px, transparent 1px),
        linear-gradient(rgba(24, 28, 37, 0.026) 1px, transparent 1px),
        var(--bg);
      background-size: 28px 28px;
      color: var(--text);
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 58px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 248, 251, 0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .topbar-inner {
      height: 100%;
      max-width: 1160px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background: linear-gradient(135deg, #3d73f5, #63b37b);
      display: grid;
      place-items: center;
      color: white;
      font-size: 16px;
      font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.22);
      flex: 0 0 auto;
    }

    .brand strong {
      display: block;
      font-size: 18px;
      line-height: 1;
      font-weight: 850;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 11px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
    }

    .button.icon {
      width: 34px;
      padding: 0;
    }

    .button.primary {
      background: var(--accent);
      color: white;
      border-color: rgba(50, 103, 227, 0.28);
      box-shadow: 0 8px 18px rgba(50, 103, 227, 0.18);
    }

    .main {
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px 20px 34px;
    }

    .utility-row {
      display: grid;
      grid-template-columns: minmax(260px, 520px) auto;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .search input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      outline: none;
      color: var(--text);
      padding: 0 14px 0 40px;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(34, 40, 55, 0.04);
    }

    .search input:focus {
      border-color: rgba(50, 103, 227, 0.42);
      box-shadow: 0 0 0 4px rgba(50, 103, 227, 0.08);
    }

    .search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .meta span {
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
    }

    .desktop-layout {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .group {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .group-header {
      min-height: 44px;
      padding: 0 12px 0 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .group-title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .group-color {
      width: 8px;
      height: 22px;
      border-radius: 999px;
      background: var(--accent);
      flex: 0 0 auto;
    }

    .group-title h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .group-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .mini {
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .mini:hover {
      background: rgba(24, 28, 37, 0.06);
      color: var(--text);
    }

    .group-body {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 4px;
      padding: 8px;
    }

    .shortcut {
      min-height: 86px;
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px 6px;
      position: relative;
      outline: none;
      transition: background 120ms ease, transform 120ms ease, box-shadow 120ms ease;
    }

    .shortcut:hover,
    .shortcut:focus-visible {
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 18px rgba(34, 40, 55, 0.08);
      transform: translateY(-1px);
    }

    .favicon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface-strong);
      box-shadow:
        0 0 0 1px rgba(24, 28, 37, 0.08),
        0 6px 14px rgba(34, 40, 55, 0.08);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .favicon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
      display: block;
    }

    .shortcut-title {
      max-width: 78px;
      color: var(--text);
      font-size: 11px;
      font-weight: 650;
      line-height: 1.18;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .add-group {
      min-height: 44px;
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.35);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 750;
    }

    @media (max-width: 720px) {
      .topbar {
        height: auto;
      }

      .topbar-inner {
        padding: 10px 12px;
      }

      .actions .button:not(.primary):not(.icon) {
        display: none;
      }

      .main {
        padding: 12px 10px 26px;
      }

      .utility-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .meta {
        justify-content: flex-start;
      }

      .group-body {
        grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      }

      .shortcut {
        min-height: 80px;
      }

      .shortcut-title {
        max-width: 68px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">L</div>
          <strong>Linky</strong>
        </div>
        <nav class="actions" aria-label="Page actions">
          <button class="button primary" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 5v14M5 12h14"></path>
            </svg>
            New Link
          </button>
          <button class="button" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
            Edit Layout
          </button>
          <button class="button icon" type="button" aria-label="Settings">
            <svg width="17" height="17" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 0 1-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 0 1 .947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 0 1 2.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 0 1 2.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 0 1 .947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 0 1-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 0 1-2.287-.947zM10 13a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" clip-rule="evenodd"></path>
            </svg>
          </button>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="utility-row">
        <label class="search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="search" placeholder="Search links">
        </label>
        <div class="meta" aria-label="Dashboard summary">
          <span>24 links</span>
          <span>4 groups</span>
          <span>19 favicons</span>
        </div>
      </div>

      <section class="desktop-layout" aria-label="Shortcut groups">
        <article class="group">
          <header class="group-header">
            <div class="group-title">
              <span class="group-color" style="background: #3267e3"></span>
              <h2>Work</h2>
              <span class="count">8</span>
            </div>
            <div class="group-actions">
              <button class="mini" type="button" aria-label="Collapse Work">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m18 15-6-6-6 6"></path></svg>
              </button>
              <button class="mini" type="button" aria-label="Edit Work">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
              </button>
            </div>
          </header>
          <div class="group-body">
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=mail.google.com&sz=64"></span><span class="shortcut-title">Gmail</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=calendar.google.com&sz=64"></span><span class="shortcut-title">Calendar</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=notion.so&sz=64"></span><span class="shortcut-title">Notion</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=figma.com&sz=64"></span><span class="shortcut-title">Figma</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=linear.app&sz=64"></span><span class="shortcut-title">Linear</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=slack.com&sz=64"></span><span class="shortcut-title">Slack</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=drive.google.com&sz=64"></span><span class="shortcut-title">Drive</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=miro.com&sz=64"></span><span class="shortcut-title">Miro</span></a>
          </div>
        </article>

        <article class="group">
          <header class="group-header">
            <div class="group-title">
              <span class="group-color" style="background: #15a06f"></span>
              <h2>Build</h2>
              <span class="count">7</span>
            </div>
            <div class="group-actions">
              <button class="mini" type="button" aria-label="Collapse Build">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m18 15-6-6-6 6"></path></svg>
              </button>
              <button class="mini" type="button" aria-label="Edit Build">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
              </button>
            </div>
          </header>
          <div class="group-body">
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=github.com&sz=64"></span><span class="shortcut-title">GitHub</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=vercel.com&sz=64"></span><span class="shortcut-title">Vercel</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=supabase.com&sz=64"></span><span class="shortcut-title">Supabase</span></a>

            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=cloudflare.com&sz=64"></span><span class="shortcut-title">Cloudflare</span></a>
          </div>
        </article>

        <article class="group">
          <header class="group-header">
            <div class="group-title">
              <span class="group-color" style="background: #e25b45"></span>
              <h2>Media</h2>
              <span class="count">5</span>
            </div>
            <div class="group-actions">
              <button class="mini" type="button" aria-label="Collapse Media">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m18 15-6-6-6 6"></path></svg>
              </button>
              <button class="mini" type="button" aria-label="Edit Media">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
              </button>
            </div>
          </header>
          <div class="group-body">
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=youtube.com&sz=64"></span><span class="shortcut-title">YouTube</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=spotify.com&sz=64"></span><span class="shortcut-title">Spotify</span></a>
            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=netflix.com&sz=64"></span><span class="shortcut-title">Netflix</span></a>

        <article class="group">
          <header class="group-header">
            <div class="group-title">
              <span class="group-color" style="background: #8a6ee8"></span>
              <h2>Home Lab</h2>
              <span class="count">4</span>
            </div>
            <div class="group-actions">
              <button class="mini" type="button" aria-label="Collapse Home Lab">

            <a class="shortcut" href="#"><span class="favicon"><img alt="" src="https://www.google.com/s2/favicons?domain=pi-hole.net&sz=64"></span><span class="shortcut-title">Pi-hole</span></a>

        <div class="add-group">

            <path d="M12 5v14M5 12h14"></path>
          </svg>
          Add Group
        </div>
      </section>
    </main>
  </div>
</body>
</html>
