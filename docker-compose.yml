services:
  launchr:
    image: larsmikki/launchr:latest
    container_name: launchr
    ports:
      - "3020:3020"
    volumes:
      - launchr-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3020/api/settings"]
      interval: 5m
      timeout: 10s
      retries: 3

volumes:
  launchr-data:
