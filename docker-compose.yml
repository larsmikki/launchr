services:
  linkpad:
    image: larsmikki/linkpad:latest
    container_name: linkpad
    ports:
      - "3020:3020"
    volumes:
      - linkpad-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3020/api/settings"]
      interval: 5m
      timeout: 10s
      retries: 3

volumes:
  linkpad-data:
